<main class="route-index">
  <header class="route-index__header">
    <h1>Paginas</h1>
  </header>

  <section class="route-index__list" aria-label="Rotas disponiveis">
    @for (group of routeGroups; track group.title) {
      <div class="route-group">
        <h2>{{ group.title }}</h2>

        <div class="route-group__links">
          @for (link of group.links; track link.path) {
            <a class="route-link" [href]="link.path" target="_blank" rel="noopener noreferrer">
              <span>{{ link.label }}</span>
              @if (link.isProtected) {
                <em>Protegida</em>
              }
            </a>
          }
        </div>
      </div>
    }
  </section>
</main>
