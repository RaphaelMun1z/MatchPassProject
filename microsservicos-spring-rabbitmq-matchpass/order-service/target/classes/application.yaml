server:
  port: 8300

spring:
  application:
    name: order-service
  config:
    import: optional:configserver:http://localhost:8888
  profiles:
    active: dev

feign:
  client:
    config:
      inventory-service:
        connectTimeout: 5000
        readTimeout: 5000

springdoc:
  api-docs:
    path: /${spring.application.name}/v3/api-docs