version: '3.8'

services:
  event-catalog-service-postgres-db:
    image: postgres:18.4
    restart: unless-stopped
    container_name: postgresql-18.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_event_catalog
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql


volumes:
  postgres_data: